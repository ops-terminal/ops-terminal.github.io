<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PI Vision - Technical Reference Terminal</title>
  <style>
    :root {
      --bg-dark: #050505; --panel-bg: #0a0a0a;
      --cyan: #00ffff; --orange: #ff8000; --yellow: #ffff00;
    }
    body { font-family: 'Segoe UI', 'Consolas', sans-serif; background-color: var(--bg-dark); color: #ffffff; margin: 0; padding: 25px; }
    .dashboard { max-width: 1600px; margin: auto; background: var(--panel-bg); border: 2px solid #333; box-shadow: 0 0 50px rgba(0,0,0,0.9); border-radius: 4px; position: relative; }
    .header { background: #000; padding: 25px 35px; border-bottom: 3px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .header-left { display: flex; flex-direction: column; gap: 8px; }
    .header h1 { font-size: 2.2rem; color: var(--cyan); margin: 0; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 15px rgba(0, 255, 255, 0.6); }
    .version-tag { display: inline-block; width: fit-content; color: #111; background: var(--yellow); border: 1px solid #999; padding: 4px 10px; font-weight: 800; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
    .btn-return { background: #1a1a1a; color: #fff; border: 2px solid #555; padding: 12px 25px; text-decoration: none; font-weight: bold; font-size: 14px; text-transform: uppercase; transition: all 0.3s; display: flex; align-items: center; gap: 10px; }
    .btn-return:hover { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); background: #222; }
    .tab-nav { display: flex; gap: 15px; padding: 25px 35px; background: #0f0f0f; }
    .tab-btn { padding: 18px 45px; border: 2px solid #444; background: #1a1a1a; color: #888; cursor: pointer; text-transform: uppercase; font-size: 18px; font-weight: 800; transition: 0.3s; }
    .tab-btn.active { background: #222; color: #fff; border-color: var(--cyan); box-shadow: inset 0 0 20px rgba(0, 255, 255, 0.2); }
    .table-wrapper { padding: 10px 35px 35px 35px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #111; padding: 22px 15px; text-align: center; text-transform: uppercase; font-size: 18px; letter-spacing: 2px; border-bottom: 3px solid #333; color: #888; }
    td { padding: 25px 15px; border-bottom: 1px solid #1a1a1a; background: #070707; }
    .val { font-family: 'Consolas', monospace; font-size: 28px; text-align: center; }
    .v { color: #00ff41; font-weight: bold; text-shadow: 0 0 10px rgba(0, 255, 65, 0.6); }
    .r { color: #ff3131; font-weight: bold; text-shadow: 0 0 10px rgba(255, 49, 49, 0.6); }
    .badge { color: #fff; font-weight: 900; font-size: 24px; padding: 8px 18px; border-radius: 3px; background: #1a1a1a; border: 1px solid #444; }
    tr:hover td { background-color: #121212; }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <div class="header-left">
      <h1>ESPECIFICACIÓN PRODUCTOS<br>REFINERÍA</h1>
      <span class="version-tag">VER 1.01</span>
    </div>
    <a id="returnLink" href="#" class="btn-return" onclick="goBack(event)">◀ RETORNO A PI VISION</a>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab(event, 'gasoil')">GASOIL / LGO</button>
    <button class="tab-btn" onclick="switchTab(event, 'dma')">DMA / HGO</button>
    <button class="tab-btn" onclick="switchTab(event, 'atf')">ATF</button>
  </div>
  <div id="gasoil" class="tab-content table-wrapper">
    <table>
      <thead><tr><th>PRODUCTO</th><th>DENS</th><th>D-95</th><th>IC</th><th>FP</th><th>CP</th><th>POFF</th><th>S (ppm)</th></tr></thead>
      <tbody id="body-gasoil"></tbody>
    </table>
  </div>
  <div id="dma" class="tab-content table-wrapper" style="display:none">
    <table>
      <thead><tr><th>PRODUCTO</th><th>DENS</th><th>D-95</th><th>IC</th><th>FP</th><th>CP</th><th>POFF</th><th>S (ppm)</th><th>VISC</th></tr></thead>
      <tbody id="body-dma"></tbody>
    </table>
  </div>
  <div id="atf" class="tab-content table-wrapper" style="display:none">
    <table>
      <thead><tr><th>PRODUCTO</th><th>DENS</th><th>D-95</th><th>FP</th><th>FREEZING</th><th>S (ppm)</th></tr></thead>
      <tbody id="body-atf"></tbody>
    </table>
  </div>
</div>
<script>
  const returnUrls = {
    gasoil: "https://rtvis-mfg-neu.bpglobal.com/PIVision/#/Displays/17428/LGO",
    dma: "https://rtvis-mfg-neu.bpglobal.com/PIVision/#/Displays/17487/DMA-PROCESS",
    atf: "https://rtvis-mfg-neu.bpglobal.com/PIVision/#/Displays/17498/PS"
  };

  let currentTab = 'gasoil';

  const db = {
    gasoil: [
      [["HVN"], ["0.79","v"], ["200","v"], ["40","r"], ["32","r"], ["-30","v"], ["-35","v"], ["2-10","v"]],
      [["LGO"], ["0.825","v"], ["250","v"], ["44","v"], ["51","v"], ["-20","v"], ["-25","v"], ["5","v"]],
      [["HHGO"], ["0.860","r"], ["375","r"], ["49","v"], ["68","v"], ["5","r"], ["4","r"], ["10-15","r"]],
      [["2ª AF"], ["-"], ["-"], ["-"], ["-"], ["-"], ["-"], ["-"]],
      [["2ª CL"], ["0.825","v"], ["270","v"], ["45","v"], ["60","v"], ["-35","v"], ["-40","v"], ["1800","r"]],
      [["3ª CL"], ["0.850","v"], ["350","v"], ["52","v"], ["65","v"], ["-5","v"], ["-10","v"], ["3500","r"]],
      [["4ª CL"], ["0.875","r"], ["400","r"], ["52","v"], ["90","v"], ["17","r"], ["8","r"], ["8500","r"]],
      [["HCN"], ["0.825","v"], ["190","v"], ["23","r"], ["40","r"], ["<-50","v"], ["<-55","v"], ["1600","r"]],
      [["LCCO"], ["0.88-0.90","r"], ["300","v"], ["30","r"], ["50","r"], ["-30","v"], ["-35","v"], ["5000","r"]],
      [["HCCO"], ["0.94","r"], ["385","r"], ["30","r"], ["65-100","v"], ["12","r"], ["10","r"], ["10000","r"]],
      [["LKGO"], ["0.87","r"], ["375","r"], ["40","r"], ["60","v"], ["-3 / +5","r"], ["8","r"], ["7500","r"]],
      [["LVGO"], ["0.88-0.90","r"], ["375","r"], ["46-54","v"], ["100","v"], ["10","r"], ["-"], ["7000","r"]]
    ],
    dma: [
      [["NP"], ["0.7900","v"], ["200","v"], ["40","r"], ["32","r"], ["-30","v"], ["-35","v"], ["2-10","v"], ["-"]],
      [["2ª CL"], ["0.8250","v"], ["270","v"], ["45","v"], ["60","v"], ["-35","v"], ["-40","v"], ["1800","r"], ["2","v"]],
      [["3ª CL"], ["0.8500","v"], ["350","v"], ["52","v"], ["65","v"], ["-5","v"], ["-10","v"], ["3500","r"], ["4","v"]],
      [["4ª CL"], ["0.8750","v"], ["400","r"], ["52","v"], ["90","v"], ["17","r"], ["8","r"], ["8500","r"], ["9","r"]],
      [["LVGO"], ["0.88-0.90","r"], ["375","r"], ["46-54","v"], ["100","v"], ["10","r"], ["-"], ["7000","r"], ["11","r"]],
      [["LCCO"], ["0.88-0.90","r"], ["300","v"], ["30","r"], ["50","r"], ["-30","v"], ["-35","v"], ["5000","r"], ["2","v"]],
      [["HCCO"], ["0.9400","r"], ["385","r"], ["30","r"], ["65-100","v"], ["12","r"], ["10","r"], ["10000","r"], ["6","r"]],
      [["LKGO"], ["0.8700","r"], ["375","r"], ["40","r"], ["60","v"], ["-3 / +5","r"], ["8","r"], ["7500","r"], ["bueno","v"]]
    ],
    atf: [
      [["NP"], ["0.790","v"], ["200",""], ["32","r"], ["-52","v"], ["0.5","v"]],
      [["2ª CL"], ["0.825","v"], ["270",""], ["55","v"], ["-42","r"], ["1000","r"]]
    ]
  };

  function render() {
    Object.keys(db).forEach(id => {
      const body = document.getElementById('body-' + id);
      body.innerHTML = db[id].map(row => {
        const prod = row[0];
        const cells = row.slice(1);
        return `<tr>
          <td><span class="badge">${prod[0]}</span></td>
          ${cells.map(c => `<td class="val ${c[1] || ''}">${c[0]}</td>`).join('')}
        </tr>`;
      }).join('');
    });
  }

  function switchTab(e, id) {
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    e.currentTarget.classList.add('active');
    currentTab = id;
  }

  function goBack(e) {
    e.preventDefault();

    if (window.history.length > 1) {
      window.history.back();
    } else {
      window.location.href = "https://rtvis-mfg-neu.bpglobal.com/PIVision/";
    }
  }

  window.onload = render;
</script>
</body>
</html>
